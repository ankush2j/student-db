<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Student Data Management</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0b0f1a;
    --surface: #111827;
    --surface2: #1a2234;
    --border: #1f2d45;
    --accent: #3b82f6;
    --accent2: #60a5fa;
    --danger: #ef4444;
    --success: #22c55e;
    --warn: #f59e0b;
    --text: #e2e8f0;
    --muted: #64748b;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Grid background ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Header ── */
  header {
    position: relative;
    z-index: 10;
    padding: 28px 40px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 20px;
    background: rgba(11,15,26,0.9);
    backdrop-filter: blur(12px);
  }

  .logo {
    width: 42px; height: 42px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono);
    font-weight: 700;
    font-size: 18px;
    color: #fff;
    flex-shrink: 0;
  }

  header h1 {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  header p {
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
  }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .stat-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent2);
  }

  /* ── Main layout ── */
  main {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  /* ── Toolbar ── */
  .toolbar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 24px;
    align-items: center;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
  }

  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }

  input[type="text"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    padding: 10px 14px 10px 38px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }

  /* ── Buttons ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 10px 18px;
    border-radius: 8px;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: #2563eb; transform: translateY(-1px); }

  .btn-ghost {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--surface2); border-color: var(--accent); }

  .btn-danger {
    background: transparent;
    color: var(--danger);
    border: 1px solid #ef444430;
  }
  .btn-danger:hover { background: #ef444415; }

  .btn-success {
    background: transparent;
    color: var(--success);
    border: 1px solid #22c55e30;
  }
  .btn-success:hover { background: #22c55e15; }

  /* ── Sort bar ── */
  .sort-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    align-items: center;
  }

  .sort-bar span {
    font-size: 12px;
    color: var(--muted);
    font-family: var(--mono);
    margin-right: 4px;
  }

  .sort-btn {
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-family: var(--mono);
    cursor: pointer;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    transition: all 0.15s;
  }

  .sort-btn:hover, .sort-btn.active {
    border-color: var(--accent);
    color: var(--accent2);
    background: rgba(59,130,246,0.08);
  }

  /* ── Table ── */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  th {
    padding: 13px 18px;
    text-align: left;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.12s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }

  td {
    padding: 14px 18px;
    font-size: 14px;
  }

  td.num {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    width: 50px;
  }

  td.name { font-weight: 500; }

  td.uid {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent2);
  }

  .sec-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    background: rgba(59,130,246,0.12);
    border: 1px solid rgba(59,130,246,0.25);
    color: var(--accent2);
  }

  .row-actions {
    display: flex;
    gap: 6px;
    opacity: 0;
    transition: opacity 0.15s;
  }

  tbody tr:hover .row-actions { opacity: 1; }

  .icon-btn {
    width: 30px; height: 30px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    font-size: 14px;
  }

  .icon-btn:hover.edit { border-color: var(--accent); color: var(--accent2); background: rgba(59,130,246,0.1); }
  .icon-btn:hover.del  { border-color: var(--danger); color: var(--danger); background: rgba(239,68,68,0.1); }

  /* ── Empty state ── */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty svg { margin-bottom: 16px; opacity: 0.3; }
  .empty h3 { font-size: 16px; margin-bottom: 6px; color: var(--text); }
  .empty p  { font-size: 13px; }

  /* ── Modal ── */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.15s ease;
  }

  .overlay.open { display: flex; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    width: 100%;
    max-width: 420px;
    animation: slideUp 0.2s ease;
    position: relative;
  }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  .modal h2 {
    font-family: var(--mono);
    font-size: 16px;
    margin-bottom: 22px;
    color: var(--text);
  }

  .field {
    margin-bottom: 16px;
  }

  .field label {
    display: block;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .field input {
    padding-left: 14px;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 24px;
    justify-content: flex-end;
  }

  .close-btn {
    position: absolute;
    top: 18px; right: 18px;
    background: none; border: none;
    color: var(--muted); cursor: pointer;
    font-size: 20px;
    line-height: 1;
    transition: color 0.15s;
  }
  .close-btn:hover { color: var(--text); }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    z-index: 999;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 18px;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    max-width: 320px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.green { border-color: #22c55e40; }
  .toast.red   { border-color: #ef444440; }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 24px;
    font-size: 12px;
    color: var(--muted);
    font-family: var(--mono);
    position: relative;
    z-index: 1;
  }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">SD</div>
  <div>
    <h1>STUDENT_DB</h1>
    <p>Data Management System</p>
  </div>
  <div class="header-right">
    <div class="stat-pill" id="headerCount">0 records</div>
    <button class="btn btn-success" onclick="exportCSV()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
      Export CSV
    </button>
  </div>
</header>

<!-- Main -->
<main>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Search by name, UID or section…" oninput="renderTable()"/>
    </div>
    <button class="btn btn-primary" onclick="openModal()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      Add Student
    </button>
    <button class="btn btn-ghost" onclick="clearAll()" title="Clear all data">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
      Clear All
    </button>
  </div>

  <!-- Sort bar -->
  <div class="sort-bar">
    <span>SORT:</span>
    <button class="sort-btn active" id="sort-name" onclick="setSort('name')">Name</button>
    <button class="sort-btn" id="sort-uid" onclick="setSort('uid')">UID</button>
    <button class="sort-btn" id="sort-section" onclick="setSort('section')">Section</button>
    <button class="sort-btn" id="sort-none" onclick="setSort('none')">Default</button>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Full Name</th>
          <th>UID</th>
          <th>Section</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

</main>

<!-- Add/Edit Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <button class="close-btn" onclick="closeModal()">×</button>
    <h2 id="modalTitle">ADD_STUDENT</h2>
    <div class="field">
      <label>Full Name</label>
      <input type="text" id="fName" placeholder="e.g. Ankush Singh"/>
    </div>
    <div class="field">
      <label>UID</label>
      <input type="text" id="fUID" placeholder="e.g. 23BCE1234"/>
    </div>
    <div class="field">
      <label>Section</label>
      <input type="text" id="fSection" placeholder="e.g. B1"/>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveStudent()">Save</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <span id="toastIcon">✓</span>
  <span id="toastMsg">Done</span>
</div>

<footer>STUDENT_DB v2.0 — data stored locally in browser · export CSV to open in Excel</footer>

<script>
  // ── State ──────────────────────────────────────────────────
  let students = JSON.parse(localStorage.getItem('students') || '[]');
  let editIdx = -1;
  let sortBy = 'name';

  // ── Persist ────────────────────────────────────────────────
  function save() {
    localStorage.setItem('students', JSON.stringify(students));
  }

  // ── Sort ───────────────────────────────────────────────────
  function setSort(key) {
    sortBy = key;
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('sort-' + key).classList.add('active');
    renderTable();
  }

  function getSorted(arr) {
    if (sortBy === 'none') return [...arr];
    return [...arr].sort((a, b) => a[sortBy].localeCompare(b[sortBy]));
  }

  // ── Render ─────────────────────────────────────────────────
  function renderTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    let data = students;
    if (q) data = data.filter(s =>
      s.name.toLowerCase().includes(q) ||
      s.uid.toLowerCase().includes(q) ||
      s.section.toLowerCase().includes(q)
    );
    data = getSorted(data);

    const tbody = document.getElementById('tableBody');
    document.getElementById('headerCount').textContent = students.length + ' record' + (students.length !== 1 ? 's' : '');

    if (data.length === 0) {
      tbody.innerHTML = `
        <tr><td colspan="5">
          <div class="empty">
            <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
            <h3>${q ? 'No results found' : 'No students yet'}</h3>
            <p>${q ? 'Try a different search term' : 'Click Add Student to get started'}</p>
          </div>
        </td></tr>`;
      return;
    }

    tbody.innerHTML = data.map((s, i) => {
      const realIdx = students.indexOf(s);
      return `
        <tr>
          <td class="num">${String(i+1).padStart(2,'0')}</td>
          <td class="name">${esc(s.name)}</td>
          <td class="uid">${esc(s.uid)}</td>
          <td><span class="sec-badge">${esc(s.section)}</span></td>
          <td>
            <div class="row-actions">
              <button class="icon-btn edit" onclick="openModal(${realIdx})" title="Edit">✏</button>
              <button class="icon-btn del"  onclick="deleteStudent(${realIdx})" title="Delete">🗑</button>
            </div>
          </td>
        </tr>`;
    }).join('');
  }

  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Modal ──────────────────────────────────────────────────
  function openModal(idx = -1) {
    editIdx = idx;
    document.getElementById('modalTitle').textContent = idx >= 0 ? 'EDIT_STUDENT' : 'ADD_STUDENT';
    document.getElementById('fName').value    = idx >= 0 ? students[idx].name    : '';
    document.getElementById('fUID').value     = idx >= 0 ? students[idx].uid     : '';
    document.getElementById('fSection').value = idx >= 0 ? students[idx].section : '';
    document.getElementById('overlay').classList.add('open');
    setTimeout(() => document.getElementById('fName').focus(), 100);
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
    editIdx = -1;
  }

  function saveStudent() {
    const name    = document.getElementById('fName').value.trim();
    const uid     = document.getElementById('fUID').value.trim();
    const section = document.getElementById('fSection').value.trim();
    if (!name || !uid || !section) {
      toast('All fields are required!', '⚠', 'red'); return;
    }
    if (editIdx >= 0) {
      students[editIdx] = { name, uid, section };
      toast('Student updated — ' + name, '✓', 'green');
    } else {
      students.push({ name, uid, section });
      toast('Student added — ' + name, '✓', 'green');
    }
    save(); closeModal(); renderTable();
  }

  // ── Delete ─────────────────────────────────────────────────
  function deleteStudent(idx) {
    if (!confirm(`Delete "${students[idx].name}" (${students[idx].uid})?`)) return;
    const name = students[idx].name;
    students.splice(idx, 1);
    save(); renderTable();
    toast('Deleted — ' + name, '🗑', 'red');
  }

  // ── Clear all ──────────────────────────────────────────────
  function clearAll() {
    if (students.length === 0) { toast('Nothing to clear', '·', ''); return; }
    if (!confirm(`Delete ALL ${students.length} students? This cannot be undone.`)) return;
    students = []; save(); renderTable();
    toast('All records cleared', '🗑', 'red');
  }

  // ── Export CSV ─────────────────────────────────────────────
  function exportCSV() {
    if (students.length === 0) { toast('No data to export', '⚠', 'red'); return; }
    let csv = '\uFEFF' + 'No.,Name,UID,Section\n';
    students.forEach((s, i) => {
      csv += `${i+1},"${s.name}","${s.uid}","${s.section}"\n`;
    });
    csv += `\nTotal,${students.length},,\n`;
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = 'students.csv';
    a.click(); URL.revokeObjectURL(url);
    toast('Exported students.csv — open in Excel', '↓', 'green');
  }

  // ── Toast ──────────────────────────────────────────────────
  let toastTimer;
  function toast(msg, icon = '✓', type = 'green') {
    const el = document.getElementById('toast');
    document.getElementById('toastMsg').textContent  = msg;
    document.getElementById('toastIcon').textContent = icon;
    el.className = 'toast ' + type + ' show';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
  }

  // ── Keyboard shortcuts ─────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if (e.key === 'Enter' && document.getElementById('overlay').classList.contains('open'))
      saveStudent();
    if ((e.ctrlKey || e.metaKey) && e.key === 'n') { e.preventDefault(); openModal(); }
  });

  // Close modal on overlay click
  document.getElementById('overlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // ── Init ───────────────────────────────────────────────────
  renderTable();
</script>
</body>
</html>
